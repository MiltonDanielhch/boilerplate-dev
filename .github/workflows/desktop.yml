# Ubicación: `.github/workflows/desktop.yml`
#
# Descripción: CI para empaquetado automático de aplicaciones Desktop.
#              Genera binarios para Windows (MSI/EXE), macOS (DMG/APP) y Linux (AppImage/DEB).
#
# ADRs relacionados: 0030 (Multiplataforma), 0010 (CI), 0013 (Build)

name: "Desktop Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # For x86_64 and ARM64
          - platform: "ubuntu-22.04" # For Linux
          - platform: "windows-latest" # For Windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install Rust stable
        uses: dtolnay/rust-action@stable

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # e.g., v1.0.0
          releaseName: "App Release v__VERSION__"
          releaseBody: "Consulte los archivos adjuntos para descargar esta versión."
          releaseDraft: true
          prerelease: false
          args: "--project apps/desktop"
