# Ubicación: `.github/workflows/ci.yml`
#
# Descripción: CI/CD con GitHub Actions.
#              Build, test, y deploy con Kamal.
#
# ADRs relacionados: 0010 (CI), 0014 (Deploy)

name: CI/CD

on:
  # Run on push to main
  push:
    branches: [main]
  # Run on PR
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Test
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: 1.85.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> "target/'{{runner_os}}'-build"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all

  # ============================================
  # Build y Push Docker
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Containerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/boilerplate-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/boilerplate-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/boilerplate-web:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/boilerplate-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deploy (solo en main)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Kamal
        uses: ghcr.io/makkes/kamal-action@v1
        with:
          secrets: |
            DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
            KAMAL_HOST=${{ secrets.KAMAL_HOST }}
        env:
          KAMAL_HOST: ${{ secrets.KAMAL_HOST }}