# Ubicación: `infra/docker/docker-compose.yml`
#
# Descripción: Docker Compose para desarrollo local.
#              Incluye api + postgres (opcional para tests)
#
# ADRs relacionados: 0014 (Deploy)

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Containerfile
      target: runtime
    ports:
      - "3000:3000"
    volumes:
      - ../..:/data
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite:data/boilerplate.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database optional (SQLite local por defecto)
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_PASSWORD: secret
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data